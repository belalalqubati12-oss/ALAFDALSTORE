<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأفضل ستور</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* الهيدر */
header{
background:#000;
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,215,0,0.2);
}

header h1{
color:gold;
margin:0;
font-size:26px;
letter-spacing:1px;
}

/* زر السلة */
.cart{
position:fixed;
top:15px;
left:15px;
background:gold;
color:black;
padding:10px 15px;
border-radius:12px;
font-weight:bold;
}

/* القسم الرئيسي */
.hero{
text-align:center;
padding:20px;
}

.hero h2{
color:gold;
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 0 15px rgba(255,215,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product h3{
margin:10px 0;
}

.price{
color:gold;
font-size:18px;
}

.btn{
display:inline-block;
margin:10px;
background:gold;
color:black;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* الفوتر */
footer{
background:#000;
text-align:center;
padding:15px;
margin-top:20px;
color:#ccc;
}
</style>

</head>

<body>

<div class="cart">🛒 (0)</div>

<header>
<h1>الأفضل ستور</h1>
</header>

<div class="hero">
<h2>أفضل المنتجات بأفضل الأسعار</h2>
</div>

<div class="products">

<div class="product">
<img src="1.jpg">
<h3>بنطال رياضي 2×1</h3>
<div class="price">3500 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

<div class="product">
<img src="2.jpg">
<h3>بنطال رياضي</h3>
<div class="price">2000 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

<div class="product">
<img src="3.jpg">
<h3>بنطال رياضي</h3>
<div class="price">2000 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

<div class="product">
<img src="4.jpg">
<h3>جهاز تمارين</h3>
<div class="price">3500 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

</div>

<footer>
📞 784440089 <br>
📍 صنعاء - التحرير - أمام مدرسة جمال عبدالناصر
</footer>

</body>
</html>
