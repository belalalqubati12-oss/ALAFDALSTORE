<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأفضل ستور</title>

<style>
body{
margin:0;
font-family:Tajawal, Arial;
background:#0a0a0a;
color:white;
}

/* شريط علوي */
.topbar{
background:gold;
color:black;
text-align:center;
padding:8px;
font-size:14px;
font-weight:bold;
}

/* الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#000;
border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
color:gold;
font-size:22px;
font-weight:bold;
}

.cart{
background:gold;
color:black;
padding:8px 14px;
border-radius:10px;
font-weight:bold;
}

/* بانر */
.hero{
text-align:center;
padding:30px 15px;
}

.hero h1{
color:gold;
margin-bottom:10px;
}

.hero p{
color:#bbb;
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,215,0,0.08);
transition:0.3s;
}

.product:hover{
transform:translateY(-6px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product h3{
margin:10px;
}

.price{
color:gold;
margin:0 10px;
font-size:18px;
}

.btn{
display:block;
margin:10px;
text-align:center;
background:gold;
color:black;
padding:10px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* زر واتساب عائم */
.whatsapp{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:50px;
font-size:18px;
text-decoration:none;
}

/* الفوتر */
footer{
background:#000;
text-align:center;
padding:15px;
color:#aaa;
margin-top:20px;
}
</style>

</head>

<body>

<div class="topbar">🔥 عروض خاصة اليوم 🔥</div>

<header>
<div class="logo">🛍️ الأفضل ستور</div>
<div class="cart">🛒 (0)</div>
</header>

<section class="hero">
<h1>مرحباً بكم في الأفضل ستور</h1>
<p>أفضل المنتجات بأفضل الأسعار</p>
</section>

<section class="products">

<div class="product">
<img src="1.jpg">
<h3>جهاز تمارين</h3>
<div class="price">3500 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

<div class="product">
<img src="2.jpg">
<h3>بنطال رياضي</h3>
<div class="price">2000 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

<div class="product">
<img src="3.jpg">
<h3>بنطال رياضي</h3>
<div class="price">2000 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

<div class="product">
<img src="4.jpg">
<h3>بنطال رياضي</h3>
<div class="price">2000 ريال</div>
<a class="btn" href="https://wa.me/967784440089">اطلب الآن</a>
</div>

</section>

<a class="whatsapp" href="https://wa.me/967784440089">💬</a>

<footer>
📞 784440089 <br>
📍 صنعاء - التحرير - أمام مدرسة جمال عبدالناصر
</footer>

</body>
</html>
