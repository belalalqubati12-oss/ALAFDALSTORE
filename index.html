<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأفضل ستور</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
background:#000;
padding:15px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.logo{
color:gold;
font-size:24px;
font-weight:bold;
}

/* SLIDER */
.slider{
overflow:hidden;
height:200px;
}

.slides{
display:flex;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:200px;
object-fit:cover;
}

@keyframes slide{
0%{transform:translateX(0)}
33%{transform:translateX(-100%)}
66%{transform:translateX(-200%)}
100%{transform:translateX(0)}
}

/* PRODUCTS */
.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.product{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,215,0,0.2);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:10px;
text-align:center;
}

.price{
color:gold;
margin:5px 0;
}

.btn{
background:gold;
color:black;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:5px;
}

/* WHATSAPP FLOAT */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
color:white;
padding:12px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

/* FOOTER */
footer{
background:#000;
text-align:center;
padding:15px;
margin-top:20px;
color:#aaa;
}
</style>

</head>

<body>

<header>
<div class="logo">الأفضل</div>
</header>

<!-- سلايدر -->
<div class="slider">
<div class="slides">
<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
</div>
</div>

<div class="container">
<div class="products">

<div class="product">
<img src="1.jpg">
<div class="product-info">
<h3>بنطال رياضي 1×2</h3>
<div class="price">عرض خاص 🔥</div>
<a class="btn" href="https://wa.me/967784440089?text=أريد طلب بنطال 1×2">اطلب الآن</a>
</div>
</div>

<div class="product">
<img src="2.jpg">
<div class="product-info">
<h3>بنطال رياضي</h3>
<div class="price">سعر مميز</div>
<a class="btn" href="https://wa.me/967784440089?text=أريد طلب بنطال">اطلب الآن</a>
</div>
</div>

<div class="product">
<img src="3.jpg">
<div class="product-info">
<h3>بنطال رياضي</h3>
<div class="price">جودة عالية</div>
<a class="btn" href="https://wa.me/967784440089?text=أريد طلب بنطال">اطلب الآن</a>
</div>
</div>

<div class="product">
<img src="4.jpg">
<div class="product-info">
<h3>جهاز تمارين</h3>
<div class="price">عرض محدود</div>
<a class="btn" href="https://wa.me/967784440089?text=أريد طلب جهاز">اطلب الآن</a>
</div>
</div>

</div>
</div>

<!-- زر واتساب -->

<footer>

</body>
</html>
