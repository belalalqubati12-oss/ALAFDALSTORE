<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأفضل ستور</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}

/* HEADER */
header{background:#000;padding:15px;text-align:center}
header img{height:80px;animation:glow 2s infinite alternate}
@keyframes glow{
0%{filter:drop-shadow(0 0 5px gold)}
100%{filter:drop-shadow(0 0 20px gold)}
}

/* PRODUCTS */
.container{padding:20px}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px
}

.product{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
text-align:center;
padding-bottom:10px
}

.product img{width:100%;height:180px;object-fit:cover}

.btn{
background:gold;color:#000;padding:8px 12px;
border-radius:8px;text-decoration:none;display:inline-block;margin-top:5px
}

/* CART */
.cart{
position:fixed;
top:10px;
left:10px;
background:gold;
color:black;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.cart-box{
position:fixed;
top:60px;
left:10px;
background:#111;
padding:15px;
border-radius:10px;
display:none;
width:200px;
}

footer{
background:#000;
text-align:center;
padding:15px;
margin-top:20px;
color:#aaa;
}
</style>

</head>

<body>

<header>
<img src="logo.png">
</header>

<div class="cart" onclick="toggleCart()">🛒 السلة (<span id="count">0</span>)</div>

<div class="cart-box" id="cartBox">
<div id="items"></div>
<br>
<a class="btn" onclick="order()">اطلب عبر واتساب</a>
</div>

<div class="container">
<div class="products">

<div class="product">
<img src="1.jpg">
<h3>بنطال 1×2</h3>
<a class="btn" onclick="add('بنطال 1×2')">أضف للسلة</a>
</div>

<div class="product">
<img src="2.jpg">
<h3>بنطال رياضي</h3>
<a class="btn" onclick="add('بنطال رياضي')">أضف للسلة</a>
</div>

<div class="product">
<img src="3.jpg">
<h3>بنطال رياضي</h3>
<a class="btn" onclick="add('بنطال رياضي 2')">أضف للسلة</a>
</div>

<div class="product">
<img src="4.jpg">
<h3>جهاز تمارين</h3>
<a class="btn" onclick="add('جهاز تمارين')">أضف للسلة</a>
</div>

</div>
</div>

<footer>
📞 784440089 <br>
📍 صنعاء - التحرير - أمام مدرسة جمال عبدالناصر
</footer>

<script>
let cart=[];

function add(item){
cart.push(item);
document.getElementById("count").innerText=cart.length;
showItems();
}

function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display = box.style.display=="block"?"none":"block";
}

function showItems(){
document.getElementById("items").innerHTML=cart.join("<br>");
}

function order(){
let text="طلب:\n"+cart.join("\n");
window.open("https://wa.me/967784440089?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
