<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALAFDAL STORE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
color:gold;
}

.hero{
text-align:center;
padding:30px;
background:linear-gradient(black,#111);
}

.hero h1{
color:gold;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,215,0,0.2);
transition:0.3s;
}

.product:hover{
transform:scale(1.03);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product-info{
padding:15px;
text-align:center;
}

.price{
color:gold;
margin:10px 0;
font-size:18px;
}

.btn{
display:inline-block;
background:gold;
color:black;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

footer{
background:#000;
text-align:center;
padding:15px;
margin-top:20px;
color:#ccc;
}
</style>
</head>

<body>

<header>
ALAFDAL STORE
</header>

<div class="hero">
<h1>أفضل المنتجات بأفضل الأسعار</h1>
<p>اطلب الآن بكل سهولة عبر واتساب</p>
</div>

<div class="container">
<div class="products">

<!-- منتج 1 -->
<div class="product">
<img src="1.jpg">
<div class="product-info">
<h3>بنطال رياضي 1×2</h3>
<div class="price">عرض خاص 🔥</div>
<a class="btn" href="https://wa.me/967784440089?text=اريد طلب بنطال 1×2">اطلب الآن</a>
</div>
</div>

<!-- منتج 2 -->
<div class="product">
<img src="2.jpg">
<div class="product-info">
<h3>بنطال رياضي</h3>
<div class="price">سعر مميز</div>
<a class="btn" href="https://wa.me/967784440089?text=اريد طلب بنطال">اطلب الآن</a>
</div>
</div>

<!-- منتج 3 -->
<div class="product">
<img src="3.jpg">
<div class="product-info">
<h3>بنطال رياضي</h3>
<div class="price">جودة عالية</div>
<a class="btn" href="https://wa.me/967784440089?text=اريد طلب بنطال">اطلب الآن</a>
</div>
</div>

<!-- منتج 4 -->
<div class="product">
<img src="4.jpg">
<div class="product-info">
<h3>جهاز تمارين</h3>
<div class="price">عرض محدود</div>
<a class="btn" href="https://wa.me/967784440089?text=اريد طلب جهاز">اطلب الآن</a>
</div>
</div>

</div>
</div>

<footer>
📞 784440089 <br>
📍 صنعاء - التحرير - أمام مدرسة جمال عبدالناصر
</footer>

</body>
</html>
