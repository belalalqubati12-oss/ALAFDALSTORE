<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأفضل ستور</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER + LOGO */
.header{
text-align:center;
padding:20px;
background:#000;
}

.logo-text{
font-size:32px;
font-weight:bold;
background:linear-gradient(45deg,gold,#fff,gold);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s infinite;
}

@keyframes shine{
0%{background-position:-200px}
100%{background-position:200px}
}

/* CART */
.cart{
position:fixed;
top:10px;
left:10px;
background:gold;
color:black;
padding:10px;
border-radius:10px;
}

/* PRODUCTS */
.container{padding:20px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.product{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
text-align:center;
padding-bottom:10px;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.btn{
background:gold;
color:black;
padding:10px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

/* FOOTER */
footer{
background:#000;
text-align:center;
padding:15px;
margin-top:20px;
color:#aaa;
}
</style>
</head>

<body>

<div class="header">
<div class="logo-text">الأفضل ستور</div>
</div>

<div class="cart">🛒 السلة</div>

<div class="container">
<div class="products">

<div class="product">
<img src="1.jpg">
<h3>بنطال 1×2</h3>
<a class="btn">أضف للسلة</a>
</div>

<div class="product">
<img src="2.jpg">
<h3>بنطال رياضي</h3>
<a class="btn">أضف للسلة</a>
</div>

<div class="product">
<img src="3.jpg">
<h3>بنطال رياضي</h3>
<a class="btn">أضف للسلة</a>
</div>

<div class="product">
<img src="4.jpg">
<h3>جهاز تمارين</h3>
<a class="btn">أضف للسلة</a>
</div>

</div>
</div>

<footer>
📞 784440089 <br>
📍 صنعاء - التحرير - أمام مدرسة جمال عبدالناصر
</footer>

</body>
</html>
